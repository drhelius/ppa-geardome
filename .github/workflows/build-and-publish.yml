name: Build and Publish PPA

on:
  workflow_dispatch:
    inputs:
      emulator:
        description: 'Emulator to build'
        required: true
        type: choice
        options:
          - geargrafx
          - gearboy
          - gearsystem
          - gearcoleco
          - gearlynx
      version:
        description: 'Version (e.g., 1.7.2)'
        required: true
      distro:
        description: 'Ubuntu codename'
        required: true
        default: 'noble'
        type: choice
        options:
          - resolute
          - noble
          - jammy

  repository_dispatch:
    types: [build-package]

env:
  SDL3_TAG: release-3.2.14

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:${{ inputs.distro || github.event.client_payload.distro }}
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Check if build is needed
        id: check
        run: |
          DISTRO="${{ inputs.distro || github.event.client_payload.distro }}"
          ARCH="${{ matrix.arch }}"
          if [ "$ARCH" = "arm64" ] && [ "$DISTRO" = "jammy" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve inputs
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "EMU=${{ inputs.emulator || github.event.client_payload.emulator }}" >> $GITHUB_ENV
          echo "VERSION=${{ inputs.version || github.event.client_payload.version }}" >> $GITHUB_ENV
          echo "DISTRO=${{ inputs.distro || github.event.client_payload.distro }}" >> $GITHUB_ENV
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Map emulator to repo name
        if: steps.check.outputs.skip != 'true'
        run: |
          case "$EMU" in
            geargrafx)  REPO_NAME="Geargrafx" ;;
            gearboy)    REPO_NAME="Gearboy" ;;
            gearsystem) REPO_NAME="Gearsystem" ;;
            gearcoleco) REPO_NAME="Gearcoleco" ;;
            gearlynx)   REPO_NAME="Gearlynx" ;;
            *) echo "Unknown emulator: $EMU" && exit 1 ;;
          esac
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV

      - name: Install build tools
        if: steps.check.outputs.skip != 'true'
        run: |
          apt-get update
          apt-get install -y git curl ca-certificates cmake build-essential \
            devscripts debhelper fakeroot lintian dpkg-dev gpg pkgconf \
            libgl-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxkbcommon-dev libwayland-dev \
            libdecor-0-dev libdrm-dev libgbm-dev libgl1-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libudev-dev
          # Install libsdl3-dev from apt on resolute+, build from source otherwise
          if apt-cache show libsdl3-dev > /dev/null 2>&1; then
            apt-get install -y libsdl3-dev
          fi

      - name: Build and install SDL3
        if: steps.check.outputs.skip != 'true' && !contains(fromJSON('["resolute"]'), env.DISTRO)
        run: |
          echo "Building SDL3 ${{ env.SDL3_TAG }}"
          git clone --depth 1 --branch "${{ env.SDL3_TAG }}" https://github.com/libsdl-org/SDL.git /tmp/SDL3
          cmake -S /tmp/SDL3 -B /tmp/SDL3/build \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSDL_TESTS=OFF \
            -DSDL_EXAMPLES=OFF
          cmake --build /tmp/SDL3/build -j$(nproc)
          cmake --install /tmp/SDL3/build
          rm -rf /tmp/SDL3

      - name: Checkout emulator source
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: drhelius/${{ env.REPO_NAME }}
          ref: ${{ env.VERSION }}

      - name: Trust checkout directory
        if: steps.check.outputs.skip != 'true'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare debian packaging
        if: steps.check.outputs.skip != 'true'
        run: |
          cp -r platforms/linux/debian .

          cat > debian/changelog << CHLOG
          ${{ env.EMU }} (${{ env.VERSION }}-1~ppa1~${{ env.DISTRO }}1) ${{ env.DISTRO }}; urgency=medium

            * Release ${{ env.VERSION }}.

           -- github-actions[bot] <github-actions[bot]@users.noreply.github.com>  $(date -R)
          CHLOG

          sed -i 's/^          //' debian/changelog

      - name: Build .deb package
        if: steps.check.outputs.skip != 'true'
        run: debuild -d -us -uc -b

      - name: Collect .deb files
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/debs
          cp ../*.deb /tmp/debs/

      - name: Upload .deb artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.EMU }}-${{ env.VERSION }}-${{ env.DISTRO }}-${{ matrix.arch }}
          path: /tmp/debs/*.deb

  publish:
    needs: build
    if: ${{ !cancelled() && needs.build.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    env:
      EMU: ${{ inputs.emulator || github.event.client_payload.emulator }}
      VERSION: ${{ inputs.version || github.event.client_payload.version }}
      DISTRO: ${{ inputs.distro || github.event.client_payload.distro }}
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download .deb artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ env.EMU }}-${{ env.VERSION }}-${{ env.DISTRO }}-*
          path: incoming/
          merge-multiple: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Get GPG key ID
        run: |
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

      - name: Clean stale incoming files
        run: |
          find incoming/ -name '*.deb' ! -name "${EMU}_*" -delete 2>/dev/null || true

      - name: Update APT repository
        run: |
          POOL="pool/${DISTRO}/main/${EMU}"

          # Remove old .deb for this emulator (keep only latest)
          mkdir -p "${POOL}"
          rm -f "${POOL}"/${EMU}_*.deb
          cp incoming/*.deb "${POOL}/"

          # Generate Packages index for each architecture
          for ARCH in amd64 arm64; do
            DIST_DIR="dists/${DISTRO}/main/binary-${ARCH}"
            mkdir -p "${DIST_DIR}"
            dpkg-scanpackages --arch "${ARCH}" "pool/${DISTRO}/" > "${DIST_DIR}/Packages"
            gzip -k -f "${DIST_DIR}/Packages"
          done

          # Generate Release file
          cd "dists/${DISTRO}"
          apt-ftparchive release . > Release

          # Sign Release (remove old signatures first)
          rm -f Release.gpg InRelease
          gpg --batch --pinentry-mode loopback --default-key "${GPG_KEY_ID}" -abs -o Release.gpg Release
          gpg --batch --pinentry-mode loopback --default-key "${GPG_KEY_ID}" --clearsign -o InRelease Release
          cd ../..

      - name: Export public key
        run: |
          gpg --armor --export "${GPG_KEY_ID}" > geardome-ppa.asc
          gpg --export "${GPG_KEY_ID}" > geardome-ppa.gpg

      - name: Commit and push
        run: |
          rm -rf incoming/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update ${EMU} ${VERSION} for ${DISTRO}"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push failed (attempt $i), rebasing and retrying..."
            git pull --rebase
            sleep $((i * 2))
          done
